image:
  repository: ghcr.io/opslync/tollgate
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# ServiceAccount for the Tollgate pod. Set create: true to have the chart make
# one (required for Kubernetes-native identity, so the RBAC below can bind it);
# otherwise the pod uses `name` if set, or the namespace default.
serviceAccount:
  create: false
  name: ""

# ClusterRole + ClusterRoleBinding granting the read + tokenreview access that
# config.kubernetes.enabled needs. Only rendered when both toggles are true.
rbac:
  create: false

# Name of an existing Secret whose keys become environment variables —
# the target for ${ENV_VAR} references in config (ANTHROPIC_API_KEY,
# TOLLGATE_ADMIN_KEY, ...). Create it before installing:
#   kubectl create secret generic tollgate-keys \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=TOLLGATE_ADMIN_KEY=$(openssl rand -hex 16)
existingSecret: ""

# SQLite persistence. Disabled = emptyDir: usage/audit data and kill-switch
# state are lost when the pod moves. Enable for anything beyond a demo.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""

# ServiceMonitor for the Prometheus Operator (e.g. kube-prometheus-stack).
# /metrics is always on (same port as the proxy, unauthenticated) — this only
# wires up scraping. `labels` commonly needs release: <prometheus-release-name>
# to match kube-prometheus-stack's default serviceMonitorSelector.
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

# Rendered verbatim into the ConfigMap as config.yaml — the full Tollgate
# configuration (see config.example.yaml in the repo).
config:
  server:
    listen: ":8080"
    # admin_key: "${TOLLGATE_ADMIN_KEY}"
  storage:
    path: "/data/tollgate.db"
  providers:
    - name: anthropic
      base_url: "https://api.anthropic.com"
      # api_key: "${ANTHROPIC_API_KEY}"
  # WARNING: no agents = authentication disabled (open passthrough mode).
  agents: []
  budgets: []
  # Kubernetes-native identity: attribute agent pods by their ServiceAccount
  # token, no per-agent key. Requires serviceAccount.create and rbac.create.
  kubernetes:
    enabled: false
  # Map namespaces to teams for attribution. A namespace's tollgate.io/team
  # label overrides this at runtime.
  teams: []
  # OTLP/HTTP trace export: one span per proxied request, POSTed as JSON to
  # a collector. Off by default; not every install runs one.
  tracing:
    enabled: false
    otlp_endpoint: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
