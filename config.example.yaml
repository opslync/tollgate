# Tollgate configuration.
# Copy to config.yaml and adjust.

server:
  listen: ":8080"
  # Enables the /admin kill-switch endpoints when set.
  admin_key: "${TOLLGATE_ADMIN_KEY}"

# SQLite database for usage/audit records (created if missing).
storage:
  path: "tollgate.db"

# Upstream LLM providers. Milestone scope: all traffic routes to the first entry.
# api_key (optional): the real provider key, injected upstream in place of the
# agent's Tollgate key. Supports ${ENV_VAR} references. When omitted, the
# caller's own credentials pass through unchanged.
providers:
  - name: anthropic
    base_url: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"

# Agents authenticate with their Tollgate key (min 16 chars — generate with
# e.g. `openssl rand -hex 16`) sent in the header their SDK already uses:
# x-api-key or Authorization: Bearer. Usage is attributed to name/team/namespace.
# WARNING: an empty agents list disables authentication (open passthrough mode).
agents:
  - name: support-bot
    key: "tg_replace_with_openssl_rand_hex_16"
    team: support
    namespace: prod

# Rolling-window spend limits per agent or team (windows: 30m, 24h, 7d).
# alert_at (default 0.8) logs a warning at that fraction of the limit.
# action at the limit: block (403) or throttle (429 + Retry-After, one
# request allowed per throttle_interval). limit_tokens counts input+output.
budgets:
  - agent: support-bot
    window: 24h
    limit_usd: 10.00
    action: block
  - team: support
    window: 7d
    limit_usd: 100.00
    alert_at: 0.75
    action: throttle
    throttle_interval: 60s
